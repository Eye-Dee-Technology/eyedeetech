<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter Popup</title>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
  emailjs.init("Dltl4eZvgHSUdsRXL"); // your public key
</script>

<style>
  body {
    font-family: Arial, sans-serif;
  }

  /* Floating button */
  #newsletterBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(90deg, #ff6c18, #ff9e3c);
    color: #fff;
    padding: 12px 22px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
    z-index: 999;
  }

  /* Overlay */
  .popup-overlay {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
  }

  /* Popup box */
  .popup {
    background: #fff;
    max-width: 400px;
    padding: 30px 20px;
    border-radius: 10px;
    text-align: center;
    margin: 10% auto;
    position: relative;
    animation: pop 0.3s ease;
  }

  @keyframes pop {
    from { transform: scale(0.8); opacity:0; }
    to { transform: scale(1); opacity:1; }
  }

  .close {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 22px;
    cursor: pointer;
  }

  input[type="email"] {
    padding: 10px;
    width: 80%;
    border: 1px solid #ccc;
    border-radius: 4px;
    margin-bottom: 10px;
  }

  button {
    padding: 10px 20px;
    background: linear-gradient(90deg, #ff6c18, #ff9e3c);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  #responseMessage {
    margin-top: 10px;
    color: rgb(6, 6, 6);
  }
</style>
</head>
<body>

<!-- Floating Button -->
<div id="newsletterBtn">📧 Subscribe</div>

<!-- Popup -->
<div class="popup-overlay" id="popup">
  <div class="popup">
    <span class="close" id="closePopup">&times;</span>

    <h2>Stay Updated!</h2>
    <p>Subscribe to our newsletter and get the latest updates and offers straight to your inbox.</p>

    <form id="newsletterForm">
      <input type="email" name="email" placeholder="Enter your email" required>
      <br>
      <button type="submit">Subscribe</button>
    </form>

    <p id="responseMessage"></p>
  </div>
</div>

<script>
  const popup = document.getElementById('popup');
  const openBtn = document.getElementById('newsletterBtn');
  const closeBtn = document.getElementById('closePopup');
  const form = document.getElementById('newsletterForm');
  const responseMessage = document.getElementById('responseMessage');

  // Open popup
  openBtn.onclick = () => popup.style.display = 'block';

  // Close popup
  closeBtn.onclick = () => popup.style.display = 'none';

  // Auto popup after 5 seconds
  setTimeout(() => {
    popup.style.display = 'block';
  }, 5000);

  // Submit form
  form.addEventListener('submit', function(e){
    e.preventDefault();
    const email = form.email.value.trim();

    if(email){
      emailjs.send("service_ac4ixtl","template_n3vg4du",{ email })
        .then(() => {
          responseMessage.textContent = "Thank you for subscribing!";
          form.reset();
        })
        .catch(err => {
          responseMessage.textContent = "Error: " + err.text;
        });
    }
  });
</script>

</body>
</html>
